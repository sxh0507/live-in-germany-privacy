<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>德国永居考试助手</title>
    <meta
      name="description"
      content="德国永居考试助手公开页面，包含隐私政策与应用支持信息。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #101828;
        --muted: #667085;
        --border: #e4e7ec;
        --primary: #0f172a;
        --accent: #1d4ed8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #fbfcfe 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px 72px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05);
        padding: 32px 28px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 14px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 34px;
        line-height: 1.15;
      }

      .subtitle {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.6;
      }

      .grid {
        display: grid;
        gap: 14px;
        margin-top: 24px;
      }

      .item {
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 18px 16px;
      }

      .item h2 {
        margin: 0 0 6px;
        font-size: 17px;
      }

      .item p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
      }

      .button-primary {
        background: var(--primary);
        color: #fff;
      }

      .button-secondary {
        border: 1px solid var(--border);
        color: var(--text);
        background: #fff;
      }

      footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 28px 16px 48px;
        }

        .card {
          padding: 24px 20px;
          border-radius: 20px;
        }

        h1 {
          font-size: 28px;
        }

        .subtitle {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <span class="eyebrow">Leben in Deutschland</span>
        <h1>德国永居考试助手</h1>
        <p class="subtitle">
          中文辅助刷题，更轻松准备考试。这里提供应用公开信息、联系邮箱与隐私政策链接，供
          Google Play 审核与用户查看。
        </p>

        <div class="grid">
          <article class="item">
            <h2>应用简介</h2>
            <p>
              支持通用题、州题、中德对照、错题本、收藏、关键词速记与模拟考试，帮助中文用户更高效准备德国永居/入籍考试。
            </p>
          </article>

          <article class="item">
            <h2>支持邮箱</h2>
            <p>
              <a href="mailto:bandeshi.app@gmail.com">bandeshi.app@gmail.com</a>
            </p>
          </article>
        </div>

        <div class="actions">
          <a class="button button-primary" href="./privacy-policy.html">查看隐私政策</a>
          <a class="button button-secondary" href="https://comfy-rows.lovable.app">打开 Web 版本</a>
        </div>
      </section>

      <footer>Last updated: 2026-04-12</footer>
    </main>
  </body>
  </html>
